AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Mini CDP Serverless
Globals:
  Function:
    Timeout: 30
    Runtime: python3.14
    Environment:
      Variables:
        ENV: dev
        S3_BUCKET:
          Ref: EventsBucket
Resources:
  EventsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::Sub: mini-cdp-events-${AWS::AccountId}
  IngestionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mini-cdp-ingestion
      CodeUri: IngestionFunction
      Handler: lambda_function.lambda_handler
      Description: "Lambda de ingest\xE3o de eventos da Mini CDP"
      Policies:
      - S3WritePolicy:
          BucketName:
            Ref: EventsBucket
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /events
            Method: post
    Metadata:
      SamResourceId: IngestionFunction
Outputs:
  ApiEndpoint:
    Description: "URL da API de ingest\xE3o"
    Value:
      Fn::Sub: https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/events
  EventsBucket:
    Description: Nome do bucket S3
    Value:
      Ref: EventsBucket
