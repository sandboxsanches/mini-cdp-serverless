AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Mini CDP Serverless

Globals:
  Function:
    Timeout: 30
    Runtime: python3.14
    Environment:
      Variables:
        ENV: dev

Resources:
  IngestionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mini-cdp-ingestion
      CodeUri: src/ingestion/
      Handler: lambda_function.lambda_handler
      Description: Lambda de ingestão de eventos da Mini CDP
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /events
            Method: post

Outputs:
  ApiEndpoint:
    Description: URL da API de ingestão
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/events"